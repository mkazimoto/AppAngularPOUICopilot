<po-page-default p-title="Editor de Workflow">

  <!-- ── Toolbar ── -->
  <div class="wf-toolbar">
    <po-button
      p-label="Limpar Tudo"
      p-kind="secondary"
      p-icon="an an-trash"
      (p-click)="clearWorkflow()">
    </po-button>
    <div class="wf-legend">
      <span class="legend-pill legend-start">▶ Início</span>
      <span class="legend-pill legend-action">⚡ Ação</span>
      <span class="legend-pill legend-decision">◆ Decisão</span>
      <span class="legend-pill legend-end">⏹ Fim</span>
    </div>
    <span class="wf-hint">Clique em <strong>+</strong> em qualquer nó para adicionar o próximo passo.</span>
  </div>

  <!-- ── Canvas ── -->
  <div class="wf-scroll" (click)="closeMenus()">
    <div class="wf-canvas" [style.width.px]="CANVAS_W" [style.height.px]="CANVAS_H">

      <!-- SVG layer: arrows -->
      <svg class="wf-svg" [attr.width]="CANVAS_W" [attr.height]="CANVAS_H">
        <defs>
          <marker id="wf-arrow" markerWidth="12" markerHeight="8"
                  refX="10" refY="4" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/>
          </marker>
        </defs>

        <g *ngFor="let conn of connections; trackBy: trackConn">
          <path
            [attr.d]="connectionPath(conn)"
            class="wf-conn-line"
            marker-end="url(#wf-arrow)"/>
          <!-- Branch label badge -->
          <rect *ngIf="conn.branch"
                [attr.x]="connectionLabelX(conn) - 18"
                [attr.y]="connectionLabelY(conn) - 10"
                width="38" height="20" rx="10"
                [class]="'conn-badge conn-badge-' + (conn.branch === 'Sim' ? 'sim' : 'nao')"/>
          <text *ngIf="conn.branch"
                [attr.x]="connectionLabelX(conn)"
                [attr.y]="connectionLabelY(conn) + 5"
                class="wf-conn-label"
                [class.label-sim]="conn.branch === 'Sim'"
                [class.label-nao]="conn.branch === 'Não'">
            {{ conn.branch }}
          </text>
        </g>
      </svg>

      <!-- ── Nodes ── -->
      <div *ngFor="let node of nodes; trackBy: trackNode"
           class="wf-node"
           [class]="'wf-' + node.type"
           [style.left.px]="node.x"
           [style.top.px]="node.y">

        <!-- ─── START ─── -->
        <div *ngIf="node.type === 'start'" class="node-body body-start">
          <span class="ni">▶</span>
          <span class="nl" [title]="node.label">{{ node.label }}</span>
          <div class="node-ctrl">
            <button class="ctrl-btn"
                    title="Editar rótulo"
                    (click)="openEdit(node); $event.stopPropagation()">
              <i class="an an-pencil"></i>
            </button>
          </div>
        </div>

        <!-- ─── ACTION ─── -->
        <div *ngIf="node.type === 'action'" class="node-body body-action">
          <span class="ni">⚡</span>
          <span class="nl" [title]="node.label">{{ node.label }}</span>
          <div class="node-ctrl">
            <button class="ctrl-btn"
                    title="Editar rótulo"
                    (click)="openEdit(node); $event.stopPropagation()">
              <i class="an an-pencil"></i>
            </button>
            <button class="ctrl-btn ctrl-del"
                    title="Excluir nó e descendentes"
                    (click)="deleteNode(node.id); $event.stopPropagation()">
              <i class="an an-x"></i>
            </button>
          </div>
        </div>

        <!-- ─── END ─── -->
        <div *ngIf="node.type === 'end'" class="node-body body-end">
          <span class="ni">⏹</span>
          <span class="nl" [title]="node.label">{{ node.label }}</span>
          <div class="node-ctrl">
            <button class="ctrl-btn"
                    title="Editar rótulo"
                    (click)="openEdit(node); $event.stopPropagation()">
              <i class="an an-pencil"></i>
            </button>
            <button class="ctrl-btn ctrl-del"
                    title="Excluir nó"
                    (click)="deleteNode(node.id); $event.stopPropagation()">
              <i class="an an-x"></i>
            </button>
          </div>
        </div>

        <!-- ─── DECISION ─── -->
        <div *ngIf="node.type === 'decision'" class="node-body body-decision">
          <div class="diamond">
            <span class="diamond-label" [title]="node.label">{{ node.label }}</span>
          </div>
          <div class="node-ctrl dec-ctrl">
            <button class="ctrl-btn"
                    title="Editar rótulo"
                    (click)="openEdit(node); $event.stopPropagation()">
              <i class="an an-pencil"></i>
            </button>
            <button class="ctrl-btn ctrl-del"
                    title="Excluir nó e descendentes"
                    (click)="deleteNode(node.id); $event.stopPropagation()">
              <i class="an an-x"></i>
            </button>
          </div>
        </div>

        <!-- ── Add buttons — START / ACTION ── -->
        <ng-container *ngIf="node.type === 'start' || node.type === 'action'">
          <button *ngIf="!hasConnection(node.id)"
                  class="btn-plus btn-plus-bottom"
                  title="Adicionar próximo passo"
                  (click)="showMenu($event, node.id)">+</button>

          <div *ngIf="isMenuOpen(node.id)"
               class="ctx-menu ctx-bottom"
               (click)="$event.stopPropagation()">
            <div class="ctx-title">Adicionar próximo:</div>
            <button class="ctx-item" (click)="addNode(node, 'action')">
              <span class="ctx-icon icon-action">⚡</span> Ação
            </button>
            <button class="ctx-item" (click)="addNode(node, 'decision')">
              <span class="ctx-icon icon-decision">◆</span> Decisão
            </button>
            <button class="ctx-item" (click)="addNode(node, 'end')">
              <span class="ctx-icon icon-end">⏹</span> Fim
            </button>
          </div>
        </ng-container>

        <!-- ── Add buttons — DECISION ── -->
        <ng-container *ngIf="node.type === 'decision'">

          <!-- Sim branch (left) -->
          <button *ngIf="!hasConnection(node.id, 'Sim')"
                  class="btn-plus btn-plus-branch btn-plus-sim"
                  title="Adicionar ramo Sim"
                  (click)="showMenu($event, node.id, 'Sim')">+ Sim</button>

          <div *ngIf="isMenuOpen(node.id, 'Sim')"
               class="ctx-menu ctx-sim"
               (click)="$event.stopPropagation()">
            <div class="ctx-title">Ramo <span class="badge-sim">Sim</span>:</div>
            <button class="ctx-item" (click)="addNode(node, 'action', 'Sim')">
              <span class="ctx-icon icon-action">⚡</span> Ação
            </button>
            <button class="ctx-item" (click)="addNode(node, 'decision', 'Sim')">
              <span class="ctx-icon icon-decision">◆</span> Decisão
            </button>
            <button class="ctx-item" (click)="addNode(node, 'end', 'Sim')">
              <span class="ctx-icon icon-end">⏹</span> Fim
            </button>
          </div>

          <!-- Não branch (right) -->
          <button *ngIf="!hasConnection(node.id, 'Não')"
                  class="btn-plus btn-plus-branch btn-plus-nao"
                  title="Adicionar ramo Não"
                  (click)="showMenu($event, node.id, 'Não')">+ Não</button>

          <div *ngIf="isMenuOpen(node.id, 'Não')"
               class="ctx-menu ctx-nao"
               (click)="$event.stopPropagation()">
            <div class="ctx-title">Ramo <span class="badge-nao">Não</span>:</div>
            <button class="ctx-item" (click)="addNode(node, 'action', 'Não')">
              <span class="ctx-icon icon-action">⚡</span> Ação
            </button>
            <button class="ctx-item" (click)="addNode(node, 'decision', 'Não')">
              <span class="ctx-icon icon-decision">◆</span> Decisão
            </button>
            <button class="ctx-item" (click)="addNode(node, 'end', 'Não')">
              <span class="ctx-icon icon-end">⏹</span> Fim
            </button>
          </div>
        </ng-container>

      </div><!-- /node -->
    </div><!-- /canvas -->
  </div><!-- /scroll -->

  <!-- ── Edit Modal ── -->
  <po-modal
    #editModal
    p-title="Editar Nó"
    p-size="sm"
    [p-primary-action]="primaryAction"
    [p-secondary-action]="secondaryAction">
    <div *ngIf="selectedNode" class="edit-form">
      <po-input
        name="wfLabel"
        p-name="wfLabel"
        p-label="Rótulo do nó"
        [(ngModel)]="editingLabel"
        p-placeholder="Ex: Validar dados"
        p-max-length="60">
      </po-input>
    </div>
  </po-modal>

</po-page-default>
