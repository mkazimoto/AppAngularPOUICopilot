<po-page-default p-title="Tree View EditÃ¡vel" [p-actions]="pageActions">

  <div class="treeview-grid">

    <!-- â”€â”€ Sticky header â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
    <div class="treeview-header">
      <div class="th th-nome">Nome</div>
      <div class="th th-categoria">Categoria</div>
      <div class="th th-responsavel">ResponsÃ¡vel</div>
      <div class="th th-status">Status</div>
      <div class="th th-acoes">AÃ§Ãµes</div>
    </div>

    <!-- â”€â”€ Virtual scroll body â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
    <cdk-virtual-scroll-viewport [itemSize]="ROW_HEIGHT" class="treeview-viewport">

      <div
        *cdkVirtualFor="let node of visibleNodes; trackBy: trackById"
        class="treeview-row"
        [class.treeview-row--editing]="node.id === editingId || node.id === SENTINEL"
        [style.height.px]="ROW_HEIGHT"
      >
        <!-- â”€â”€ Nome â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="td td-nome">
          <div class="tree-cell" [style.paddingLeft]="indentPx(node.level)">

            <button
              *ngIf="node.hasChildren && node.id !== editingId && node.id !== SENTINEL"
              class="expand-btn"
              (click)="toggle(node)"
              [attr.aria-expanded]="node.expanded"
            >
              <i class="an"
                 [class.an-caret-right]="!node.expanded"
                 [class.an-caret-down]="node.expanded"></i>
            </button>
            <span
              *ngIf="!node.hasChildren || node.id === editingId || node.id === SENTINEL"
              class="expand-spacer"
            ></span>

            <i *ngIf="node.id !== SENTINEL" class="an node-icon"
               [class.an-folder-full]="node.hasChildren && !node.expanded"
               [class.an-folder-open]="node.hasChildren && node.expanded"
               [class.an-file-text]="!node.hasChildren"></i>
            <i *ngIf="node.id === SENTINEL" class="an an-plus-circle node-icon node-icon--new"></i>

            <span *ngIf="node.id !== SENTINEL && node.id !== editingId" class="node-label">{{ node.label }}</span>

            <input *ngIf="node.id === editingId" class="inline-input"
              [(ngModel)]="editForm.label" placeholder="Nome"
              (keyup.enter)="saveEdit()" (keyup.escape)="cancelEdit()" />

            <input *ngIf="node.id === SENTINEL" class="inline-input"
              [(ngModel)]="addForm.label" placeholder="Nome"
              (keyup.enter)="saveAdd()" (keyup.escape)="cancelAdd()" />
          </div>
        </div>

        <!-- â”€â”€ Categoria â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="td td-categoria">
          <span *ngIf="node.id !== SENTINEL && node.id !== editingId">{{ node.category }}</span>
          <select *ngIf="node.id === editingId" class="inline-select" [(ngModel)]="editForm.category">
            <option *ngFor="let o of categoryOptions" [value]="o.value">{{ o.label }}</option>
          </select>
          <select *ngIf="node.id === SENTINEL" class="inline-select" [(ngModel)]="addForm.category">
            <option *ngFor="let o of categoryOptions" [value]="o.value">{{ o.label }}</option>
          </select>
        </div>

        <!-- â”€â”€ ResponsÃ¡vel â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="td td-responsavel">
          <span *ngIf="node.id !== SENTINEL && node.id !== editingId">{{ node.responsible }}</span>
          <input *ngIf="node.id === editingId" class="inline-input"
            [(ngModel)]="editForm.responsible" placeholder="ResponsÃ¡vel"
            (keyup.enter)="saveEdit()" (keyup.escape)="cancelEdit()" />
          <input *ngIf="node.id === SENTINEL" class="inline-input"
            [(ngModel)]="addForm.responsible" placeholder="ResponsÃ¡vel"
            (keyup.enter)="saveAdd()" (keyup.escape)="cancelAdd()" />
        </div>

        <!-- â”€â”€ Status â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="td td-status">
          <po-tag *ngIf="node.id !== SENTINEL && node.id !== editingId"
            [p-label]="statusLabel(node.status)" [p-type]="statusType(node.status)"></po-tag>
          <select *ngIf="node.id === editingId" class="inline-select" [(ngModel)]="editForm.status">
            <option *ngFor="let o of statusOptions" [value]="o.value">{{ o.label }}</option>
          </select>
          <select *ngIf="node.id === SENTINEL" class="inline-select" [(ngModel)]="addForm.status">
            <option *ngFor="let o of statusOptions" [value]="o.value">{{ o.label }}</option>
          </select>
        </div>

        <!-- â”€â”€ AÃ§Ãµes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
        <div class="td td-acoes">
          <div *ngIf="node.id !== SENTINEL && node.id !== editingId" class="actions-row">
            <po-button p-icon="an an-pencil" p-kind="tertiary" p-label="" p-size="small" (p-click)="startEdit(node)"></po-button>
            <po-button p-icon="an an-plus"   p-kind="tertiary" p-label="" p-size="small" (p-click)="startAdd(node.id)"></po-button>
            <po-button p-icon="an an-trash"  p-kind="tertiary" [p-danger]="true" p-label="" p-size="small" (p-click)="deleteNode(node)"></po-button>
          </div>
          <div *ngIf="node.id === editingId" class="actions-row">
            <po-button p-icon="an an-check" p-kind="primary"  p-label="" p-size="small" (p-click)="saveEdit()"></po-button>
            <po-button p-icon="an an-x"     p-kind="tertiary" p-label="" p-size="small" (p-click)="cancelEdit()"></po-button>
          </div>
          <div *ngIf="node.id === SENTINEL" class="actions-row">
            <po-button p-icon="an an-check" p-kind="primary"  p-label="" p-size="small" (p-click)="saveAdd()"></po-button>
            <po-button p-icon="an an-x"     p-kind="tertiary" p-label="" p-size="small" (p-click)="cancelAdd()"></po-button>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="visibleNodes.length === 0" class="empty-row">
        <i class="an an-tree-structure empty-icon"></i>
        <p>Nenhum item. Clique em <strong>Adicionar Raiz</strong> para comeÃ§ar.</p>
      </div>

    </cdk-virtual-scroll-viewport>

  </div>

</po-page-default>
