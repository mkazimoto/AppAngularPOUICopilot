<po-page-default p-title="Visualizador IFC" [p-actions]="pageActions">

  @if (modelLoaded()) {
    <po-tag p-value="Modelo carregado" [p-type]="tagType" p-icon="an an-check-circle"></po-tag>
    <po-tag [p-value]="loadedFileName()" p-icon="an an-file"></po-tag>
  }

  <input
    id="ifc-file-input"
    type="file"
    accept=".ifc"
    (change)="onFileSelected($event)"
  />

  <div class="viewer-wrapper">
    <div #viewerContainer class="viewer-canvas"></div>

    @if (isLoading()) {
      <div class="loading-overlay">
        <div class="loading-progress-box">
          <div class="loading-header">
            <span class="loading-spinner an an-circle-notch"></span>
            <span class="loading-filename">{{ loadingMessage() }}</span>
          </div>
          <po-progress
            class="ifc-progress"
            [p-value]="loadingProgress()"
            p-show-percentage
            p-disabled-cancel>
          </po-progress>
        </div>
      </div>
    }

    @if (!modelLoaded() && !isLoading()) {
      <div class="empty-state">
        <span class="empty-state-icon an an-building"></span>
        <p>Nenhum modelo carregado</p>
        <p>Clique em "Abrir arquivo IFC" para visualizar um modelo BIM</p>
      </div>
    }
  </div>

</po-page-default>
