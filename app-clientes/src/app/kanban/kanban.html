<po-page-default p-title="Kanban — Tarefas da Equipe">

  <div class="kanban-board">

    <div *ngFor="let column of columns" class="kanban-column">

      <!-- Cabeçalho da coluna -->
      <div class="kanban-column-header">
        <span class="kanban-column-title">{{ column.title }}</span>
        <po-badge
          [p-value]="getColumnCount(column.id)"
          [p-status]="column.badgeStatus"
          p-size="medium">
        </po-badge>
      </div>

      <!-- Cards -->
      <div
        class="kanban-cards"
        [class.kanban-drop-target]="isDropTarget(column.id)"
        (dragover)="onDragOver($event, column.id)"
        (dragleave)="onDragLeave(column.id)"
        (drop)="onDrop(column.id)">
        <div
          *ngFor="let task of getTasksByColumn(column.id)"
          class="kanban-card"
          draggable="true"
          [class.kanban-card--dragging]="isDragging(task)"
          (dragstart)="onDragStart(task)"
          (dragend)="onDragEnd()">

          <!-- Header do card: avatar + nome -->
          <div class="kanban-card-top">
            <po-avatar
              [p-src]="task.photo"
              p-size="sm">
            </po-avatar>
            <div class="kanban-card-assignee-info">
              <span class="kanban-card-title">{{ task.title }}</span>
              <span class="kanban-card-assignee">{{ task.assignee }}</span>
            </div>
          </div>

          <!-- Descrição -->
          <p class="kanban-card-description">{{ task.description }}</p>

          <!-- Barra de progresso -->
          <div class="kanban-card-progress">
            <span class="kanban-card-progress-label">Progresso: {{ task.progress }}%</span>
            <po-progress
              [p-value]="task.progress"
              [p-status]="getProgressStatus(task.progress)"
              p-disabled-cancel="true">
            </po-progress>
          </div>

          <!-- Rodapé: prioridade + ações -->
          <div class="kanban-card-footer">
            <po-tag
              [p-value]="task.priority"
              [p-type]="task.priorityType">
            </po-tag>

            <div class="kanban-card-actions">
              <po-button
                p-icon="an an-eye"
                p-kind="tertiary"
                p-aria-label="Ver detalhes"
                (p-click)="openDetail(task)">
              </po-button>
              <po-button
                *ngIf="!isFirstColumn(column.id)"
                p-icon="an an-arrow-left"
                p-kind="tertiary"
                p-aria-label="Mover para coluna anterior"
                (p-click)="moveTask(task, 'back')">
              </po-button>
              <po-button
                *ngIf="!isLastColumn(column.id)"
                p-icon="an an-arrow-right"
                p-kind="tertiary"
                p-aria-label="Mover para próxima coluna"
                (p-click)="moveTask(task, 'forward')">
              </po-button>
            </div>
          </div>

        </div>

        <!-- Estado vazio -->
        <div *ngIf="getTasksByColumn(column.id).length === 0" class="kanban-empty">
          <span class="an an-tray kanban-empty-icon"></span>
          <span>Nenhuma tarefa</span>
        </div>

      </div>
    </div>

  </div>

  <!-- Modal de detalhes do card -->
  <po-modal
    #detailModal
    p-title="Detalhes da Tarefa"
    p-size="md"
    [p-primary-action]="modalCloseAction">

    <ng-container *ngIf="selectedTask">

      <!-- Perfil do responsável -->
      <div class="detail-profile">
        <po-avatar
          [p-src]="selectedTask.photo"
          p-size="lg">
        </po-avatar>
        <div class="detail-profile-info">
          <span class="detail-assignee-name">{{ selectedTask.assignee }}</span>
          <span class="detail-assignee-label">Responsável</span>
        </div>
      </div>

      <po-divider p-label="Informações"></po-divider>

      <div class="po-row">
        <div class="po-col-12">
          <po-info
            p-label="Título"
            [p-value]="selectedTask.title">
          </po-info>
        </div>
      </div>

      <div class="po-row">
        <div class="po-col-12">
          <po-info
            p-label="Descrição"
            [p-value]="selectedTask.description">
          </po-info>
        </div>
      </div>

      <div class="po-row">
        <div class="po-col-6">
          <po-info
            p-label="Coluna"
            [p-value]="getColumnLabel(selectedTask.column)">
          </po-info>
        </div>
        <div class="po-col-6">
          <po-info
            p-label="Prioridade"
            [p-value]="selectedTask.priority">
          </po-info>
        </div>
      </div>

      <div class="po-row">
        <div class="po-col-6">
          <po-info
            p-label="Prazo"
            [p-value]="selectedTask.dueDate || 'Não definido'">
          </po-info>
        </div>
        <div class="po-col-6">
          <po-info
            p-label="Esforço estimado"
            [p-value]="selectedTask.effort || 'Não informado'">
          </po-info>
        </div>
      </div>

      <po-divider p-label="Tags"></po-divider>

      <div class="detail-tags">
        <po-tag
          *ngFor="let tag of selectedTask.tags"
          [p-value]="tag"
          [p-type]="PoTagType.Info">
        </po-tag>
        <span *ngIf="!selectedTask.tags?.length" class="detail-no-tags">Sem tags</span>
      </div>

    </ng-container>

  </po-modal>

</po-page-default>
